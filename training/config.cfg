# Starter config for spaCy transformer + NER training.
# If you need a full config, regenerate one with:
# python -m spacy init config training/config.cfg --pipeline transformer,ner --optimize accuracy --force

[nlp]
lang = "en"
pipeline = ["transformer", "ner"]
batch_size = 128

after_creation = null
after_pipeline_creation = null
tokenizer = {"@tokenizers":"spacy.Tokenizer.v1"}

[components]

[components.transformer]
factory = "transformer"
max_batch_items = 4096

[components.transformer.model]
@architectures = "spacy-transformers.TransformerModel.v3"
name = "roberta-base"
tokenizer_config = {"use_fast":true}
transformer_config = {}

[components.transformer.set_extra_annotations]
@annotation_setters = "spacy-transformers.null_annotation_setter.v1"

[components.ner]
factory = "ner"
incorrect_spans_key = null
moves = null
scorer = {"@scorers":"spacy.ner_scorer.v1"}
update_with_oracle_cut_size = 100

[corpora]

[corpora.dev]
@readers = "spacy.Corpus.v1"
path = ${paths.dev}
max_length = 0
gold_preproc = false
limit = 0
augmenter = null

[corpora.train]
@readers = "spacy.Corpus.v1"
path = ${paths.train}
max_length = 0
gold_preproc = false
limit = 0
augmenter = null

[training]
seed = 42
gpu_allocator = "pytorch"
dropout = 0.1
accumulate_gradient = 3
patience = 1600
max_steps = 5000
eval_frequency = 200

[training.optimizer]
@optimizers = "Adam.v1"
learn_rate = 0.00005
beta1 = 0.9
beta2 = 0.999
L2_is_weight_decay = true
L2 = 0.01
grad_clip = 1.0
use_averages = false
eps = 0.00000001

[training.batcher]
@batchers = "spacy.batch_by_words.v1"
size = 3000
buffer = 256
discard_oversize = true
get_length = null

[initialize]
vectors = null
init_tok2vec = null
vocab_data = null
lookups = null
before_init = null
after_init = null
components = {}

[initialize.components]

[initialize.tokenizer]

[paths]
train = "data/combined/train.spacy"
dev = "data/combined/dev.spacy"

[system]
seed = 42
gpu_allocator = "pytorch"
